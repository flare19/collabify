<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collabify</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #313244;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    h1 {
      font-size: 1.8rem;
      color: #cba6f7;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.9rem;
      color: #a6adc8;
    }

    input {
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #cdd6f4;
      font-size: 1rem;
      outline: none;
      width: 100%;
    }

    input:focus {
      border-color: #cba6f7;
    }

    input::placeholder {
      color: #585b70;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #585b70;
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #45475a;
    }

    button {
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    #btn-create {
      background: #cba6f7;
      color: #1e1e2e;
    }

    #btn-join {
      background: #89b4fa;
      color: #1e1e2e;
    }

    .error {
      color: #f38ba8;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div>
      <h1>Collabify</h1>
      <p>Real-time collaborative code editor</p>
    </div>

    <input id="username" type="text" placeholder="Choose a username" maxlength="20" />
    <span class="error" id="error">Please enter a username</span>

    <button id="btn-create">Create Room</button>

    <div class="divider">or join existing</div>

    <input id="room-id" type="text" placeholder="Enter room ID" maxlength="8" />
    <button id="btn-join">Join Room</button>
  </div>

  <script>
    const usernameInput = document.getElementById('username')
    const roomIdInput = document.getElementById('room-id')
    const errorEl = document.getElementById('error')

    function getUsername() {
      const val = usernameInput.value.trim()
      if (!val) {
        errorEl.style.display = 'block'
        return null
      }
      errorEl.style.display = 'none'
      return val
    }

    document.getElementById('btn-create').addEventListener('click', async () => {
      const username = getUsername()
      if (!username) return

      const res = await fetch('/rooms', { method: 'POST' })
      const { roomId } = await res.json()
      window.location.href = `/editor.html?room=${roomId}&username=${encodeURIComponent(username)}`
    })

    document.getElementById('btn-join').addEventListener('click', () => {
      const username = getUsername()
      if (!username) return

      const roomId = roomIdInput.value.trim()
      if (!roomId) return

      window.location.href = `/editor.html?room=${roomId}&username=${encodeURIComponent(username)}`
    })
  </script>
</body>
</html>
